name: bdai
description: BDAi - Bangladesh's own AI assistant app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2
  http: ^1.2.2
  image_picker: ^1.1.2
  flutter_markdown: ^0.7.4
  cached_network_image: ^3.4.1
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - images/
